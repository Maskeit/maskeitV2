name: Deploy Codeale

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: VPS_HOST
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Package artifact
        run: tar -czf dist.tar.gz -C dist .

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Upload to VPS
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} mkdir -p /home/admin/incoming
          scp -i ~/.ssh/deploy_key dist.tar.gz ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/admin/incoming/

      - name: Deploy (atomic swap)
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash << 'EOF'
            set -e

            DEPLOY_DIR="/home/admin/codeale"
            INCOMING="/home/admin/incoming"

            mkdir -p "$INCOMING/new"
            tar -xzf "$INCOMING/dist.tar.gz" -C "$INCOMING/new"

            if [ -d "$DEPLOY_DIR/current" ]; then
              rm -rf "$DEPLOY_DIR/previous"
              mv "$DEPLOY_DIR/current" "$DEPLOY_DIR/previous"
            fi

            mkdir -p "$DEPLOY_DIR"
            mv "$INCOMING/new" "$DEPLOY_DIR/current"

            rm -f "$INCOMING/dist.tar.gz"
            echo "✅ Deploy completado"
          EOF